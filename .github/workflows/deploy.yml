name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22

          script: |
            echo "🚀 Starting deployment..."

            # Go to home
            cd ~

            # Clone repo if not exists
            if [ ! -d "medical-report-analyzer" ]; then
              echo "📥 Cloning repository..."
              git clone https://github.com/YOUR_USERNAME/YOUR_REPO.git medical-report-analyzer
            fi

            cd medical-report-analyzer

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📂 Moving to backend..."
            cd backend

            echo "🐍 Setting up virtual environment..."
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate

            echo "📦 Installing dependencies..."
            pip install --upgrade pip
            pip install -r requirements.txt

            echo "🔄 Restarting service..."
            sudo systemctl restart mediscan

            echo "📊 Checking service status..."
            sudo systemctl status mediscan --no-pager

            echo "✅ Deployment completed!"
